<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1c1c1e;
      --surface: #2c2c2e;
      --surface2: #3a3a3c;
      --border: #48484a;
      --accent: #0a84ff;
      --accent-hover: #409cff;
      --success: #30d158;
      --error: #ff453a;
      --warning: #ffd60a;
      --text: #f2f2f7;
      --text-2: #ebebf5cc;
      --text-3: #ebebf599;
      --radius: 10px;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Views ─────────────────────────────────────── */
    .view {
      display: none;
      padding: 16px;
      animation: fadeIn .15s ease;
    }

    .view.active {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 0;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      color: var(--text-3);
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color .15s, background .15s;
    }

    .icon-btn:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ── Status chip ─────────────────────────────────── */
    .status-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 12px;
      color: var(--text-2);
      min-height: 42px;
      transition: background .2s;
    }

    .status-chip.generating {
      background: #1a2d3f;
    }

    .status-chip.success {
      background: #1a2f24;
    }

    .status-chip.error {
      background: #2f1e1e;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-3);
      flex-shrink: 0;
      transition: background .2s;
    }

    .status-chip.generating .status-dot {
      background: var(--accent);
      animation: pulse 1s infinite;
    }

    .status-chip.success .status-dot {
      background: var(--success);
    }

    .status-chip.error .status-dot {
      background: var(--error);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .3;
      }
    }

    /* ── Selected text preview ────────────────────────── */
    .preview-box {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 10px 12px;
      color: var(--text-2);
      font-size: 12px;
      max-height: 80px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--border);
      line-height: 1.6;
    }

    .preview-box::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24px;
      background: linear-gradient(transparent, var(--surface));
    }

    .preview-label {
      font-size: 11px;
      color: var(--text-3);
      margin-bottom: 4px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    /* ── Buttons ─────────────────────────────────────── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 16px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      width: 100%;
      transition: all .15s;
      user-select: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .btn-primary:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text-2);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    /* ── Settings form ─────────────────────────────────── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .field input,
    .field select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 11px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      width: 100%;
      transition: border-color .15s;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--accent);
    }

    .field input::placeholder {
      color: var(--text-3);
    }

    .field select option {
      background: var(--surface2);
    }

    .folder-row {
      display: flex;
      gap: 8px;
    }

    .folder-row input {
      flex: 1;
    }

    .folder-row .btn {
      width: auto;
      padding: 9px 12px;
      font-size: 12px;
    }

    .api-hint {
      font-size: 11px;
      color: var(--text-3);
      line-height: 1.5;
    }

    .api-hint a {
      color: var(--accent);
      text-decoration: none;
    }

    .divider {
      height: 1px;
      background: var(--border);
      border: none;
    }

    .settings-save-row {
      display: flex;
      gap: 8px;
    }

    .settings-save-row .btn {
      flex: 1;
    }

    /* ── Folder status ─────────────────────────────────── */
    .folder-status {
      font-size: 12px;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .folder-status.set {
      color: var(--success);
    }

    .folder-status.set::before {
      content: '✓ ';
    }

    /* ── Loading spinner ─────────────────────────────────── */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, .2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <!-- ─── Header ─────────────────────────── -->
  <div class="header">
    <span class="header-title">Auto Narration</span>
    <div style="display:flex;gap:4px;">
      <button class="icon-btn" id="refreshPreviewBtn" title="Re-read selection">
        <!-- refresh icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10" />
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
        </svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <!-- gear icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </button>
    </div>
  </div>

  <!-- ─── Main View ─────────────────────── -->
  <div class="view active" id="mainView">

    <!-- Status -->
    <div class="status-chip" id="statusChip">
      <div class="status-dot"></div>
      <span id="statusText">Ready</span>
    </div>

    <!-- Selected text preview -->
    <div>
      <div class="preview-label">Selected Text</div>
      <div class="preview-box" id="previewBox">
        <span id="previewText" style="color:var(--text-3);font-style:italic;">Highlight text in your document…</span>
      </div>
    </div>

    <!-- No folder warning removed — files go to Downloads automatically -->

    <!-- Generate button -->
    <button class="btn btn-primary" id="generateBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
      </svg>
      Generate Audio
    </button>

  </div>

  <!-- ─── Settings View ─────────────────────── -->
  <div class="view" id="settingsView">

    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:15px;font-weight:600;">Settings</span>
      <button class="icon-btn" id="closeSettingsBtn" title="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <hr class="divider">

    <!-- API Key -->
    <div class="field">
      <label>ElevenLabs API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-…" autocomplete="off">
      <span class="api-hint">
        Get your key at <a href="https://elevenlabs.io/app/settings/api-keys" target="_blank">elevenlabs.io</a>
      </span>
    </div>

    <!-- Voice -->
    <div class="field">
      <label>Voice</label>
      <div style="display:flex;gap:8px;">
        <select id="voiceSelect" style="flex:1;">
          <option value="">— enter API key to load voices —</option>
        </select>
        <button class="btn btn-secondary" id="loadVoicesBtn"
          style="width:auto;padding:9px 12px;font-size:12px;">Load</button>
      </div>
      <span class="api-hint" id="voiceHint"></span>
    </div>

    <!-- Model -->
    <div class="field">
      <label>Model</label>
      <select id="modelSelect">
        <option value="eleven_multilingual_v2">Multilingual v2 (Best Quality)</option>
        <option value="eleven_turbo_v2_5">Turbo v2.5 (Fastest)</option>
        <option value="eleven_monolingual_v1">Monolingual v1</option>
      </select>
    </div>

    <hr class="divider">

    <!-- Save Folder removed: files download to your browser's Downloads folder automatically -->

    <div style="display:flex;gap:8px;padding-top:4px;">
      <button class="btn btn-secondary" id="cancelSettingsBtn" style="flex:1;">Cancel</button>
      <button class="btn btn-primary" id="saveSettingsBtn" style="flex:1;">Save Settings</button>
    </div>

  </div>

  <script>
    /* ════════════════════════════════════════════
       STATE
    ════════════════════════════════════════════ */
    let state = {
      apiKey: '',
      voiceId: '',
      voiceName: '',
      modelId: 'eleven_multilingual_v2',
      selectedText: '',
    };

    // Load settings from Google PropertiesService (survives sidebar close)
    function loadState() {
      if (typeof google === 'undefined' || !google.script) {
        // Dev/test mode: fall back to localStorage
        try {
          const saved = JSON.parse(localStorage.getItem('autoNarrationSettings') || '{}');
          Object.assign(state, saved);
        } catch (e) { }
        return;
      }
      google.script.run
        .withSuccessHandler(function (props) {
          state.apiKey = props.apiKey || '';
          state.voiceId = props.voiceId || '';
          state.voiceName = props.voiceName || '';
          state.modelId = props.modelId || 'eleven_multilingual_v2';
          // Restore voice dropdown option if we have a saved voice
          if (state.voiceId) ensureVoiceOption(state.voiceId, state.voiceName);
          updateGenerateBtn();
        })
        .withFailureHandler(function () { })
        .getUserProperties();
    }

    function saveState() {
      const props = {
        apiKey: state.apiKey,
        voiceId: state.voiceId,
        voiceName: state.voiceName,
        modelId: state.modelId,
      };
      if (typeof google !== 'undefined' && google.script) {
        google.script.run.setUserProperties(props);
      } else {
        // Dev/test mode fallback
        try { localStorage.setItem('autoNarrationSettings', JSON.stringify(props)); } catch (e) { }
      }
    }

    /* ════════════════════════════════════════════
       VIEW HELPERS
    ════════════════════════════════════════════ */
    function showView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function setStatus(msg, type = '') {
      const chip = document.getElementById('statusChip');
      chip.className = 'status-chip' + (type ? ' ' + type : '');
      // Replace any spinner with just the dot
      const dot = chip.querySelector('.status-dot') || (() => {
        const d = document.createElement('div'); d.className = 'status-dot'; return d;
      })();
      chip.innerHTML = '';
      chip.appendChild(dot);
      const span = document.createElement('span');
      span.textContent = msg;
      chip.appendChild(span);
      document.getElementById('statusText');
    }

    function setStatusGenerating(msg) {
      const chip = document.getElementById('statusChip');
      chip.className = 'status-chip generating';
      chip.innerHTML = '<div class="spinner"></div><span>' + msg + '</span>';
    }

    function updatePreview(text) {
      const el = document.getElementById('previewText');
      if (text) {
        el.style.color = '';
        el.style.fontStyle = '';
        el.textContent = text;
      } else {
        el.style.color = 'var(--text-3)';
        el.style.fontStyle = 'italic';
        el.textContent = 'Highlight text in your document…';
      }
      updateGenerateBtn();
    }

    function updateGenerateBtn() {
      const ready = state.apiKey && state.voiceId;
      document.getElementById('generateBtn').disabled = !ready;
    }

    /* ════════════════════════════════════════════
       FETCH SELECTED TEXT FROM DOC
    ════════════════════════════════════════════ */
    function fetchSelectedText() {
      // Guard: google.script.run only exists inside a real Google Docs sidebar
      if (typeof google === 'undefined' || !google.script) {
        setStatus('Ready (dev mode — no doc connected)', '');
        return;
      }
      setStatus('Reading selection…');
      google.script.run
        .withSuccessHandler(function (res) {
          if (res.success) {
            state.selectedText = res.text;
            updatePreview(res.text);
            setStatus('Ready');
          } else {
            state.selectedText = '';
            updatePreview('');
            setStatus(res.error, 'error');
          }
        })
        .withFailureHandler(function (err) {
          setStatus('Could not read selection — try refreshing the sidebar.', 'error');
        })
        .getSelectedText();
    }

    /* ════════════════════════════════════════════
       SETTINGS
    ════════════════════════════════════════════ */
    function openSettings() {
      // Populate form with current state
      document.getElementById('apiKeyInput').value = state.apiKey;
      document.getElementById('modelSelect').value = state.modelId;
      // Populate voice dropdown
      if (state.voiceId) {
        ensureVoiceOption(state.voiceId, state.voiceName);
        document.getElementById('voiceSelect').value = state.voiceId;
      }
      showView('settingsView');
    }

    function ensureVoiceOption(id, name) {
      const sel = document.getElementById('voiceSelect');
      let opt = sel.querySelector('[value="' + id + '"]');
      if (!opt) {
        opt = document.createElement('option');
        opt.value = id;
        opt.textContent = name || id;
        sel.appendChild(opt);
      }
    }

    /* ════════════════════════════════════════════
       LOAD VOICES FROM ELEVENLABS
    ════════════════════════════════════════════ */
    async function loadVoices() {
      const apiKey = document.getElementById('apiKeyInput').value.trim();
      if (!apiKey) {
        document.getElementById('voiceHint').textContent = 'Enter an API key first.';
        return;
      }
      document.getElementById('voiceHint').textContent = 'Loading voices…';
      document.getElementById('loadVoicesBtn').disabled = true;

      try {
        const res = await fetch('https://api.elevenlabs.io/v1/voices', {
          headers: { 'xi-api-key': apiKey }
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const sel = document.getElementById('voiceSelect');
        sel.innerHTML = '<option value="">— select a voice —</option>';
        data.voices
          .sort((a, b) => a.name.localeCompare(b.name))
          .forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.voice_id;
            opt.textContent = v.name + (v.labels?.accent ? ' (' + v.labels.accent + ')' : '');
            sel.appendChild(opt);
          });
        if (state.voiceId) sel.value = state.voiceId;
        document.getElementById('voiceHint').textContent = data.voices.length + ' voices loaded.';
      } catch (e) {
        document.getElementById('voiceHint').textContent = 'Error: ' + e.message + '. Check your API key.';
      } finally {
        document.getElementById('loadVoicesBtn').disabled = false;
      }
    }

    /* ════════════════════════════════════════════
       FOLDER PICKER  (File System Access API)
    ════════════════════════════════════════════ */
    async function pickFolder() {
      try {
        const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
        state.dirHandle = handle;
        state.folderName = handle.name;
        saveState();
        refreshFolderStatus();
      } catch (e) {
        if (e.name !== 'AbortError') {
          alert('Could not access folder: ' + e.message);
        }
      }
    }

    /* ════════════════════════════════════════════
       DOWNLOAD AUDIO  (standard browser download — works in iframe sandboxes)
    ════════════════════════════════════════════ */
    async function writeAudioToFolder(audioBlob, filename) {
      // Create a temporary object URL and click a hidden anchor to download.
      // This saves to the user's browser Downloads folder.
      // (showDirectoryPicker is blocked in cross-origin iframes like Google Docs sidebars)
      const url = URL.createObjectURL(audioBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      // Revoke after a short delay to let the download start
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }

    /* ════════════════════════════════════════════
       GENERATE AUDIO
    ════════════════════════════════════════════ */
    async function generateAudio() {
      if (!state.apiKey || !state.voiceId) return;

      const btn = document.getElementById('generateBtn');
      btn.disabled = true;

      // Always grab the latest selection from the doc first
      setStatusGenerating('Reading selection…');
      try {
        const text = await new Promise((resolve, reject) => {
          if (typeof google === 'undefined' || !google.script) {
            // Dev mode — use whatever's already in state
            resolve(state.selectedText || '');
            return;
          }
          google.script.run
            .withSuccessHandler(function (res) {
              if (res.success && res.text) {
                resolve(res.text);
              } else {
                reject(new Error(res.error || 'No text selected. Highlight some text first.'));
              }
            })
            .withFailureHandler(function (err) {
              reject(new Error('Could not read selection — try refreshing the sidebar.'));
            })
            .getSelectedText();
        });

        state.selectedText = text;
        updatePreview(text);
      } catch (e) {
        setStatus(e.message, 'error');
        btn.disabled = false;
        updateGenerateBtn();
        return;
      }

      setStatusGenerating('Generating audio…');

      try {
        // Call ElevenLabs TTS
        const response = await fetch(
          'https://api.elevenlabs.io/v1/text-to-speech/' + state.voiceId,
          {
            method: 'POST',
            headers: {
              'xi-api-key': state.apiKey,
              'Content-Type': 'application/json',
              'Accept': 'audio/mpeg',
            },
            body: JSON.stringify({
              text: state.selectedText,
              model_id: state.modelId,
              voice_settings: { stability: 0.5, similarity_boost: 0.75 }
            })
          }
        );

        if (!response.ok) {
          const errText = await response.text();
          throw new Error('ElevenLabs error ' + response.status + ': ' + errText.slice(0, 120));
        }

        setStatusGenerating('Saving file…');
        const blob = await response.blob();

        // Build filename: AutoVO_VoiceName_YYYYMMDD_HHmmss.mp3
        const now = new Date();
        const ts = now.getFullYear().toString() +
          String(now.getMonth() + 1).padStart(2, '0') +
          String(now.getDate()).padStart(2, '0') + '_' +
          String(now.getHours()).padStart(2, '0') +
          String(now.getMinutes()).padStart(2, '0') +
          String(now.getSeconds()).padStart(2, '0');
        const safeName = (state.voiceName || 'VO').replace(/[^a-zA-Z0-9]/g, '');
        const filename = 'AutoVO_' + safeName + '_' + ts + '.mp3';

        await writeAudioToFolder(blob, filename);

        setStatus('Saved: ' + filename, 'success');

      } catch (e) {
        setStatus(e.message, 'error');
        console.error(e);
      } finally {
        btn.disabled = false;
        updateGenerateBtn();
      }
    }

    /* ════════════════════════════════════════════
       SAVE SETTINGS
    ════════════════════════════════════════════ */
    function saveSettings() {
      const apiKey = document.getElementById('apiKeyInput').value.trim();
      const voiceSelect = document.getElementById('voiceSelect');
      const voiceId = voiceSelect.value;
      const voiceName = voiceSelect.selectedOptions[0]?.textContent || '';
      const modelId = document.getElementById('modelSelect').value;

      if (!apiKey) {
        alert('Please enter your ElevenLabs API key.');
        return;
      }

      state.apiKey = apiKey;
      state.voiceId = voiceId;
      state.voiceName = voiceName.split(' (')[0]; // strip label
      state.modelId = modelId;
      saveState();

      showView('mainView');
      updateGenerateBtn();
    }

    /* ════════════════════════════════════════════
       EVENT LISTENERS
    ════════════════════════════════════════════ */
    document.getElementById('settingsBtn').addEventListener('click', openSettings);
    document.getElementById('closeSettingsBtn').addEventListener('click', () => showView('mainView'));
    document.getElementById('cancelSettingsBtn').addEventListener('click', () => showView('mainView'));
    document.getElementById('saveSettingsBtn').addEventListener('click', saveSettings);
    document.getElementById('loadVoicesBtn').addEventListener('click', loadVoices);
    document.getElementById('generateBtn').addEventListener('click', generateAudio);
    document.getElementById('refreshPreviewBtn').addEventListener('click', fetchSelectedText);

    /* ════════════════════════════════════════════
       INIT
    ════════════════════════════════════════════ */
    loadState();

    // Check if we're inside Google Docs (where google.script.run is available)
    if (typeof google === 'undefined' || !google.script) {
      setStatus('Ready (dev mode — no doc connected)', '');
    }

    updateGenerateBtn();
    // Only auto-fetch selection if inside Google Docs
    if (typeof google !== 'undefined' && google.script) {
      fetchSelectedText();
    }
  </script>
</body>

</html>
